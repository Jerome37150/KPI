name: Set Solutions PMS Web

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-solutions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run set-solutions script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/set-solutions.cjs
